name: Linux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ubuntu:
    name: Ubuntu build and tests
    runs-on: ubuntu-22.04
    env:
      NCNN_REF: dda2e28bae2a084760361197d87f06e685604e52

    steps:
      - name: Checkout HunyuanOCR-ncnn
        uses: actions/checkout@v7

      - name: Checkout ncnn
        uses: actions/checkout@v7
        with:
          repository: Tencent/ncnn
          path: _deps/ncnn
          ref: ${{ env.NCNN_REF }}

      - name: Apply pinned ncnn patches
        run: python scripts/apply_ncnn_patches.py --ncnn-dir _deps/ncnn

      - name: Install Python test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y python3-numpy

      - name: Configure ncnn
        run: >
          cmake -S _deps/ncnn -B _deps/ncnn-build
          -DCMAKE_BUILD_TYPE=Release
          -DNCNN_VULKAN=OFF
          -DNCNN_OPENMP=OFF
          -DNCNN_RUNTIME_CPU=OFF
          -DNCNN_AVX=OFF
          -DNCNN_AVX2=OFF
          -DNCNN_AVX512=OFF
          -DNCNN_FMA=OFF
          -DNCNN_BUILD_TOOLS=OFF
          -DNCNN_BUILD_EXAMPLES=OFF
          -DNCNN_BUILD_BENCHMARK=OFF
          -DNCNN_BUILD_TESTS=OFF
          -DNCNN_INSTALL_SDK=ON

      - name: Build ncnn
        run: cmake --build _deps/ncnn-build --target ncnn --parallel 2

      - name: Install ncnn SDK
        run: cmake --install _deps/ncnn-build --prefix _deps/ncnn-install

      - name: Configure HunyuanOCR-ncnn
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -Dncnn_DIR="${{ github.workspace }}/_deps/ncnn-install/lib/cmake/ncnn"
          -DHUNYUAN_OCR_BUILD_CLI=ON
          -DHUNYUAN_OCR_BUILD_TESTS=ON
          -DHUNYUAN_OCR_STRICT_WARNINGS=ON

      - name: Build HunyuanOCR-ncnn
        run: cmake --build build --parallel 2

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
