name: Windows Compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  msvc-2022:
    name: MSVC 2022 compile-only
    runs-on: windows-2022
    env:
      NCNN_REF: 244f30c8b995d5b2cf57b59950596490c68813d6

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout HunyuanOCR-ncnn
        uses: actions/checkout@v4

      - name: Checkout ncnn
        uses: actions/checkout@v4
        with:
          repository: Tencent/ncnn
          path: _deps/ncnn
          ref: ${{ env.NCNN_REF }}

      - name: Configure ncnn
        run: >
          cmake -S _deps/ncnn -B _deps/ncnn-build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DNCNN_VULKAN=OFF
          -DNCNN_OPENMP=OFF
          -DNCNN_BUILD_TOOLS=OFF
          -DNCNN_BUILD_EXAMPLES=OFF
          -DNCNN_BUILD_BENCHMARK=OFF
          -DNCNN_BUILD_TESTS=OFF
          -DNCNN_INSTALL_SDK=ON

      - name: Build ncnn
        run: cmake --build _deps/ncnn-build --config Release --target ncnn --parallel

      - name: Install ncnn SDK
        run: cmake --install _deps/ncnn-build --config Release --prefix _deps/ncnn-install

      - name: Configure HunyuanOCR-ncnn
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=Release
          -Dncnn_DIR="${{ github.workspace }}\_deps\ncnn-install\lib\cmake\ncnn"
          -DHUNYUAN_OCR_USE_NCNN_PACKAGE=ON
          -DHUNYUAN_OCR_BUILD_CLI=ON
          -DHUNYUAN_OCR_BUILD_TESTS=ON
          -DHUNYUAN_OCR_BUILD_TOKENIZER_TEST=OFF
          -DHUNYUAN_OCR_STRICT_WARNINGS=ON

      - name: Build HunyuanOCR-ncnn
        run: cmake --build build --config Release --parallel

      - name: Test HunyuanOCR 1.5 custom layers and UTF-8 boundaries
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=error -R "precise_sdpa|multimodal_rope|utf8|dflash_runtime|decoder_microbench_parser|text_decoder_aux|cli_options|package_model"

  ucrt64:
    name: UCRT64 compile and UTF-8 tests
    runs-on: windows-2022
    env:
      NCNN_REF: 244f30c8b995d5b2cf57b59950596490c68813d6

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout HunyuanOCR-ncnn
        uses: actions/checkout@v4

      - name: Checkout ncnn
        uses: actions/checkout@v4
        with:
          repository: Tencent/ncnn
          path: _deps/ncnn
          ref: ${{ env.NCNN_REF }}

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Configure ncnn
        run: >
          cmake -S _deps/ncnn -B _deps/ncnn-build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DNCNN_VULKAN=OFF
          -DNCNN_OPENMP=OFF
          -DNCNN_BUILD_TOOLS=OFF
          -DNCNN_BUILD_EXAMPLES=OFF
          -DNCNN_BUILD_BENCHMARK=OFF
          -DNCNN_BUILD_TESTS=OFF
          -DNCNN_INSTALL_SDK=ON

      - name: Build and install ncnn SDK
        run: >
          cmake --build _deps/ncnn-build --parallel &&
          cmake --install _deps/ncnn-build --prefix _deps/ncnn-install

      - name: Configure HunyuanOCR-ncnn
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -Dncnn_DIR="$PWD/_deps/ncnn-install/lib/cmake/ncnn"
          -DHUNYUAN_OCR_USE_NCNN_PACKAGE=ON
          -DHUNYUAN_OCR_BUILD_CLI=ON
          -DHUNYUAN_OCR_BUILD_TESTS=ON
          -DHUNYUAN_OCR_BUILD_TOKENIZER_TEST=OFF
          -DHUNYUAN_OCR_STRICT_WARNINGS=ON

      - name: Build HunyuanOCR-ncnn
        run: cmake --build build --parallel

      - name: Test HunyuanOCR 1.5 custom layers and UTF-8 CLI
        run: ctest --test-dir build --output-on-failure --no-tests=error -R "precise_sdpa|multimodal_rope|utf8|dflash_runtime|decoder_microbench_parser|text_decoder_aux|cli_options|package_model"
